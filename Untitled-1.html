<html>
<head>
    <meta charset="UTF-8">
    <title>Pay roll processing</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Pay roll processing</h1>
    <p>Enter the employee's name and hours worked to calculate the pay.</p>
    <form id="payrollForm">
        <label for="employeeName">Employee Name:</label>
        <input type="text" id="employeeName" name="employeeName" required><br><br>
        
        <label for="hoursWorked">Hours Worked:</label>
        <input type="number" id="hoursWorked" name="hoursWorked" required><br><br>

         <label for="hourlyPay">Hourly Pay:</label>
        <input type="number" id="hourlyPay" name="hourlyPay" required><br><br>

        <button type="submit">Calculate Pay</button>
    </form>
    
    <div id="result">

    </div>

    <script src="script.js"></script>
</body>
</html>
